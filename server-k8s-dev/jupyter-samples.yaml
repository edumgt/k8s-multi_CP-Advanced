apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyterlab-teradata20
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jupyterlab-teradata20
  template:
    metadata:
      labels:
        app: jupyterlab-teradata20
    spec:
      imagePullSecrets:
      - name: harbor-robot-cicd
      containers:
      - name: app
        image: ghcr.io/k8s-fss/jupyterlab-teradata20:1.9
        imagePullPolicy: Always
        command: ["/bin/sh","-c","sleep 36000"]
---
