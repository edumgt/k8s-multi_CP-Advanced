apiVersion: v1
kind: ConfigMap
metadata:
  name: fss-dis-server-config
  namespace: app
data:
  NODE_ENV: production
  APP_NAME: fss-dis-server-node
  PORT: "3000"
  K8S_APP_NAMESPACE: app
  K8S_USER_NAMESPACE: dis
  LAB_GOVERNANCE_ENABLED: "true"
  JUPYTER_IMAGE: ghcr.io/k8s-fss/jupter-teradata-fss:0.0.1
  JUPYTER_ACCESS_MODE: dynamic-route
  JUPYTER_DYNAMIC_HOST_SUFFIX: service.jupyter.fss.or.kr
  JUPYTER_DYNAMIC_SCHEME: https
  JUPYTER_DYNAMIC_SUBDOMAIN: jupyter-named-pod
  JUPYTER_WORKSPACE_ROOT: /workspace/user-home
  JUPYTER_BOOTSTRAP_DIR: /opt/platform/bootstrap-workspace
  AUTH_TOKEN_TTL_SECONDS: "28800"
  AUTH_SESSION_PREFIX: "fss:auth:session:"
  METRICS_COLLECT_INTERVAL_SECONDS: "60"
  METRICS_RETENTION_DAYS: "14"
  METRICS_COLLECTION_NAME: k8s_metrics_samples
  CORS_ORIGINS: ""
  FRONTEND_URL: "https://dis.fss.or.kr"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fss-dis-metrics-collector-script
  namespace: app
data:
  k8s_metrics_collector.py: |
    import os
    import time
    import signal
    from datetime import datetime, timezone

    from kubernetes import client, config
    from pymongo import ASCENDING, DESCENDING, MongoClient


    MONGO_URI = os.getenv(
        "MONGO_URI",
        "mongodb://root:root-password@mongo.infra.svc.cluster.local:27017/fss_dis?authSource=admin",
    )
    INTERVAL_SECONDS = max(15, int(os.getenv("METRICS_COLLECT_INTERVAL_SECONDS", "60")))
    RETENTION_DAYS = max(1, int(os.getenv("METRICS_RETENTION_DAYS", "14")))
    COLLECTION_NAME = os.getenv("METRICS_COLLECTION_NAME", "k8s_metrics_samples")

    stopping = False


    def parse_cpu_to_milli(value: str) -> int:
        raw = (value or "").strip()
        if not raw:
            return 0
        if raw.endswith("n"):
            return round(float(raw[:-1]) / 1_000_000)
        if raw.endswith("u"):
            return round(float(raw[:-1]) / 1_000)
        if raw.endswith("m"):
            return int(float(raw[:-1]))
        return round(float(raw) * 1000)


    def parse_memory_to_bytes(value: str) -> int:
        raw = (value or "").strip()
        if not raw:
            return 0
        units = {
            "Ki": 1024,
            "Mi": 1024**2,
            "Gi": 1024**3,
            "Ti": 1024**4,
            "Pi": 1024**5,
            "Ei": 1024**6,
            "K": 1000,
            "M": 1000**2,
            "G": 1000**3,
            "T": 1000**4,
            "P": 1000**5,
            "E": 1000**6,
        }
        suffix = ""
        number = raw
        for u in sorted(units.keys(), key=len, reverse=True):
            if raw.endswith(u):
                suffix = u
                number = raw[: -len(u)]
                break
        n = float(number)
        return round(n * units[suffix]) if suffix else round(n)


    def stop_handler(sig, _frame):
        global stopping
        print(f"[collector] received signal={sig}, stopping...")
        stopping = True


    signal.signal(signal.SIGTERM, stop_handler)
    signal.signal(signal.SIGINT, stop_handler)


    def main():
        config.load_incluster_config()
        core = client.CoreV1Api()
        custom = client.CustomObjectsApi()

        mongo = MongoClient(MONGO_URI, serverSelectionTimeoutMS=5000)
        db_name = MONGO_URI.rsplit("/", 1)[-1].split("?", 1)[0] or "fss_dis"
        db = mongo[db_name]
        col = db[COLLECTION_NAME]
        col.create_index([("sampled_at", ASCENDING)], expireAfterSeconds=RETENTION_DAYS * 24 * 60 * 60)
        col.create_index([("summary.namespace_count", ASCENDING), ("sampled_at", DESCENDING)])

        print(
            f"[collector] started interval={INTERVAL_SECONDS}s retention_days={RETENTION_DAYS} "
            f"collection={db_name}.{COLLECTION_NAME}"
        )

        while not stopping:
            sampled_at = datetime.now(timezone.utc)
            try:
                ns_items = core.list_namespace().items
                namespaces = [n.metadata.name for n in ns_items if n.metadata and n.metadata.name]

                node_metrics = custom.list_cluster_custom_object("metrics.k8s.io", "v1beta1", "nodes").get("items", [])
                pod_metrics = custom.list_cluster_custom_object("metrics.k8s.io", "v1beta1", "pods").get("items", [])

                nodes = []
                for item in node_metrics:
                    usage = item.get("usage", {})
                    nodes.append(
                        {
                            "name": item.get("metadata", {}).get("name", ""),
                            "cpu_milli": parse_cpu_to_milli(usage.get("cpu", "")),
                            "memory_bytes": parse_memory_to_bytes(usage.get("memory", "")),
                        }
                    )

                pods = []
                for item in pod_metrics:
                    containers = item.get("containers", [])
                    cpu_milli = sum(parse_cpu_to_milli(c.get("usage", {}).get("cpu", "")) for c in containers)
                    memory_bytes = sum(parse_memory_to_bytes(c.get("usage", {}).get("memory", "")) for c in containers)
                    pods.append(
                        {
                            "namespace": item.get("metadata", {}).get("namespace", ""),
                            "name": item.get("metadata", {}).get("name", ""),
                            "cpu_milli": cpu_milli,
                            "memory_bytes": memory_bytes,
                        }
                    )

                summary = {
                    "namespace_count": len(namespaces),
                    "node_count": len(nodes),
                    "pod_count": len(pods),
                    "total_cpu_milli": sum(n["cpu_milli"] for n in nodes),
                    "total_memory_bytes": sum(n["memory_bytes"] for n in nodes),
                }

                col.insert_one(
                    {
                        "sampled_at": sampled_at,
                        "namespaces": namespaces,
                        "nodes": nodes,
                        "pods": pods,
                        "summary": summary,
                    }
                )
                print(
                    f"[collector] sampled_at={sampled_at.isoformat()} "
                    f"nodes={summary['node_count']} pods={summary['pod_count']}"
                )
            except Exception as exc:
                print(f"[collector] sample failed: {exc}")
            time.sleep(INTERVAL_SECONDS)

        mongo.close()


    if __name__ == "__main__":
        main()
---
apiVersion: v1
kind: Secret
metadata:
  name: fss-dis-server-secret
  namespace: app
type: Opaque
stringData:
  MONGO_URI: mongodb://root:root-password@mongo.infra.svc.cluster.local:27017/fss_dis?authSource=admin
  REDIS_URL: redis://root:root-password@redis.infra.svc.cluster.local:6379/0
  JUPYTER_TOKEN: platform123
  CONTROL_PLANE_USERNAME: admin@test.com
  CONTROL_PLANE_PASSWORD: "123456"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fss-dis-server
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fss-dis-server-k8s-access
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["nodes", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fss-dis-server-k8s-access
subjects:
  - kind: ServiceAccount
    name: fss-dis-server
    namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fss-dis-server-k8s-access
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fss-dis-metrics-collector
  namespace: app
  labels:
    app.kubernetes.io/name: fss-dis-metrics-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fss-dis-metrics-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fss-dis-metrics-collector
    spec:
      serviceAccountName: fss-dis-server
      containers:
        - name: collector
          image: ghcr.io/k8s-fss/fss-dis-metrics-collector:20260414-1
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /opt/platform/jobs/k8s_metrics_collector.py
          envFrom:
            - configMapRef:
                name: fss-dis-server-config
            - secretRef:
                name: fss-dis-server-secret
          volumeMounts:
            - name: collector-script
              mountPath: /opt/platform/jobs/k8s_metrics_collector.py
              subPath: k8s_metrics_collector.py
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: collector-script
          configMap:
            name: fss-dis-metrics-collector-script
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fss-dis-server
  namespace: app
  labels:
    app.kubernetes.io/name: fss-dis-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fss-dis-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fss-dis-server
    spec:
      serviceAccountName: fss-dis-server
      containers:
        - name: server
          image: ghcr.io/k8s-fss/fss-dis-server-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: fss-dis-server-config
            - secretRef:
                name: fss-dis-server-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fss-dis-server
  namespace: app
spec:
  selector:
    app.kubernetes.io/name: fss-dis-server
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: fss-dis-api
  namespace: app
spec:
  selector:
    app.kubernetes.io/name: fss-dis-server
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fss-dis-frontend
  namespace: app
  labels:
    app.kubernetes.io/name: fss-dis-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: fss-dis-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fss-dis-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/k8s-fss/fss-dis-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fss-dis-frontend
  namespace: app
spec:
  selector:
    app.kubernetes.io/name: fss-dis-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fss-dis
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /livez
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fss-dis-frontend
                port:
                  number: 80
    - host: dis.fss.or.kr
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /livez
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: fss-dis-server
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fss-dis-frontend
                port:
                  number: 80
