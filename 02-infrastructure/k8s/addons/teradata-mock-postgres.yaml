apiVersion: v1
kind: Secret
metadata:
  name: teradata-mock-postgres-auth
type: Opaque
stringData:
  POSTGRES_DB: teradata_mock
  POSTGRES_USER: td_mock_user
  POSTGRES_PASSWORD: td_mock_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teradata-mock-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teradata-mock-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teradata-mock-postgres
  template:
    metadata:
      labels:
        app: teradata-mock-postgres
    spec:
      containers:
        - name: postgres
          image: 10.111.111.72/library/platform-postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: teradata-mock-postgres-auth
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 20
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: teradata-mock-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: teradata-mock-postgres
spec:
  selector:
    app: teradata-mock-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
