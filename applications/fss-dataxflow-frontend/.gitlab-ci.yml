stages:
  - build
  - deploy
  - verify

variables:
  HARBOR_REGISTRY: "ghcr.io"
  HARBOR_PROJECT: "app"
  IMAGE_NAME: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/fss-dataxflow-frontend"
  NEXUS_NPM_REGISTRY: "http://192.168.56.10:30091/repository/npm-all/"
  DEPLOY_NAMESPACE: "dataxflow-dev"
  CONTROL_PLANE_IP: "192.168.56.10"
  TARGET_NODES: "192.168.56.10 192.168.56.11 192.168.56.12"
  SSH_USER: "ubuntu"
  SSH_PASSWORD: "ubuntu"
  INGRESS_LB_IP: "192.168.56.240"

default:
  image: docker.io/library/docker:27-cli

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      variables:
        DEPLOY_ENV: "dev"
        APP_ENV: "dev"
        VITE_API_BASE_URL: "http://api.dataxflow.local"
        FRONTEND_HOST: "dataxflow.local"
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        DEPLOY_ENV: "dev"
        APP_ENV: "dev"
        VITE_API_BASE_URL: "http://api.dataxflow.local"
        FRONTEND_HOST: "dataxflow.local"
    - if: '$CI_COMMIT_BRANCH == "prod"'
      variables:
        DEPLOY_ENV: "prod"
        APP_ENV: "prod"
        VITE_API_BASE_URL: "http://api.dataxflow.local"
        FRONTEND_HOST: "dataxflow.local"
    - when: never

build_frontend_image:
  stage: build
  tags:
    - control-plane-shell
  script:
    - set -euo pipefail
    - test -n "${NEXUS_NPM_REGISTRY:-}" || (echo "NEXUS_NPM_REGISTRY is required" && exit 1)
    - echo "${NEXUS_NPM_REGISTRY}" | grep -Eq 'nexus\.platform\.local|127\.0\.0\.1:30091|192\.168\.56\.(10|240):30091' || (echo "NEXUS_NPM_REGISTRY must point to local Nexus" && exit 1)
    - |
      BUILD_ARGS=()
      BUILD_ARGS+=(--build-arg "APP_ENV=${APP_ENV}")
      BUILD_ARGS+=(--build-arg "NPM_REGISTRY=${NEXUS_NPM_REGISTRY}")
      if [ -n "${NEXUS_NPM_AUTH_B64:-}" ]; then
        BUILD_ARGS+=(--build-arg "NPM_AUTH_B64=${NEXUS_NPM_AUTH_B64}")
      fi
      DOCKER_BUILDKIT=0 docker build "${BUILD_ARGS[@]}" \
        --no-cache \
        --build-arg "VITE_API_BASE_URL=${VITE_API_BASE_URL}" \
        -t "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" \
        -t "${IMAGE_NAME}:latest" .
    - TAR_PATH="/tmp/frontend-${CI_PIPELINE_ID}-${CI_JOB_ID}.tar"
    - TAR_NAME="$(basename "${TAR_PATH}")"
    - docker save "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}" -o "${TAR_PATH}"
    - |
      for node in ${TARGET_NODES}; do
        sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${SSH_USER}@${node}" \
          "printf '%s\n' '${SSH_PASSWORD}' | sudo -S -p '' rm -f /tmp/${TAR_NAME}"
        sshpass -p "${SSH_PASSWORD}" scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${TAR_PATH}" "${SSH_USER}@${node}:/tmp/${TAR_NAME}"
        sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${SSH_USER}@${node}" \
          "printf '%s\n' '${SSH_PASSWORD}' | sudo -S -p '' ctr -n k8s.io images import /tmp/${TAR_NAME} && rm -f /tmp/${TAR_NAME}"
      done
    - rm -f "${TAR_PATH}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod" || $CI_COMMIT_BRANCH == "main"'

deploy_frontend:
  stage: deploy
  tags:
    - control-plane-shell
  needs:
    - build_frontend_image
  script:
    - set -euo pipefail
    - |
      sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${SSH_USER}@${CONTROL_PLANE_IP}" "
        printf '%s\n' '${SSH_PASSWORD}' | sudo -S -p '' KUBECONFIG=/etc/kubernetes/admin.conf kubectl -n '${DEPLOY_NAMESPACE}' set image deployment/frontend frontend='${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}'
        printf '%s\n' '${SSH_PASSWORD}' | sudo -S -p '' KUBECONFIG=/etc/kubernetes/admin.conf kubectl -n '${DEPLOY_NAMESPACE}' rollout status deployment/frontend --timeout=240s
        printf '%s\n' '${SSH_PASSWORD}' | sudo -S -p '' KUBECONFIG=/etc/kubernetes/admin.conf kubectl -n '${DEPLOY_NAMESPACE}' get deploy frontend -o wide
        printf '%s\n' '${SSH_PASSWORD}' | sudo -S -p '' KUBECONFIG=/etc/kubernetes/admin.conf kubectl -n '${DEPLOY_NAMESPACE}' get pods -l app=frontend -o wide
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod" || $CI_COMMIT_BRANCH == "main"'

verify_frontend_route:
  stage: verify
  tags:
    - control-plane-shell
  needs:
    - deploy_frontend
  script:
    - set -euo pipefail
    - 'curl -fsS -I -H "Host: ${FRONTEND_HOST}" "http://${INGRESS_LB_IP}/"'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "prod" || $CI_COMMIT_BRANCH == "main"'
