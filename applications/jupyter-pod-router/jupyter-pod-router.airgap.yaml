apiVersion: v1
kind: Service
metadata:
  name: jupyter-pod-router
  namespace: dis
  labels:
    app.kubernetes.io/name: jupyter-pod-router
    app.kubernetes.io/environment: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jupyter-pod-router
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter-pod-router
  namespace: dis
  labels:
    app.kubernetes.io/name: jupyter-pod-router
    app.kubernetes.io/environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jupyter-pod-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jupyter-pod-router
    spec:
      imagePullSecrets:
      - name: dis-harbor-pull
      containers:
      - name: router
        image: 10.111.111.72:80/app/jupyter-pod-router:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: ROUTER_PATH_PREFIX
          value: /jupyter
        - name: ROUTER_BACKEND_URL
          value: http://fss-dis-server.app.svc.cluster.local:3000
        - name: ROUTER_SHARED_SECRET
          value: change-this-jupyter-router-secret
        - name: ROUTER_RESOLVE_MODE
          value: deterministic
        - name: ROUTER_JUPYTER_TOKEN
          value: platform123
        - name: ROUTER_AUTH_COOKIE_NAME
          value: fss_app_session
        - name: ROUTER_USER_COOKIE_NAME
          value: jupyter_route_userid
        - name: ROUTER_HEADLESS_SERVICE
          value: jupyter-named-pod
        - name: ROUTER_TARGET_NAMESPACE
          value: data-platform-dev
        - name: ROUTER_TARGET_PORT
          value: "8888"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jupyter-user-routing
  namespace: dis
  labels:
    app.kubernetes.io/environment: dev
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /jupyter
        pathType: Prefix
        backend:
          service:
            name: jupyter-pod-router
            port:
              number: 8080
