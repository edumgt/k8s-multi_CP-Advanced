apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp-ingress
  namespace: app
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /headlamp-dashboard
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 80
