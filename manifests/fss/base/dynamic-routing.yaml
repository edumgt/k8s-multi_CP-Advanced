apiVersion: v1
kind: Service
metadata:
  name: jupyter-named-pod
  namespace: dis
  labels:
    app.kubernetes.io/component: user-jupyter-routing
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: user-jupyter
  ports:
    - name: http
      port: 8888
      targetPort: 8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jupyter-pod-router
  namespace: dis
  labels:
    app.kubernetes.io/name: jupyter-pod-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jupyter-pod-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jupyter-pod-router
    spec:
      containers:
        - name: router
          image: harbor.local/library/jupyter-pod-router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: ROUTER_HOST_SUFFIX
              value: "service.jupyter.fss.or.kr"
            - name: ROUTER_HEADLESS_SERVICE
              value: "jupyter-named-pod"
            - name: ROUTER_TARGET_NAMESPACE
              value: "dis"
            - name: ROUTER_TARGET_PORT
              value: "8888"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: jupyter-pod-router
  namespace: dis
spec:
  selector:
    app.kubernetes.io/name: jupyter-pod-router
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jupyter-user-wildcard
  namespace: dis
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: "*.service.jupyter.fss.or.kr"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jupyter-pod-router
                port:
                  number: 8080
