apiVersion: apps/v1
kind: Deployment
metadata:
  name: fss-dis-frontend
  namespace: app
  labels:
    app.kubernetes.io/name: fss-dis-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fss-dis-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fss-dis-frontend
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-1
      containers:
        - name: frontend
          image: 192.168.56.10:30092/app/fss-adw-frontend:20260420-135948
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fss-dis-frontend
  namespace: app
spec:
  selector:
    app.kubernetes.io/name: fss-dis-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fss-dis-frontend-ingress
  namespace: app
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /fss-dis-frontend(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: fss-dis-frontend
                port:
                  number: 80
